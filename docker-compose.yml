version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=file:./dev.db
      - PORT=5000
      - JWT_SECRET=dev_secret_key_123
      - MSG91_API_KEY=dev_key
      - MSG91_TEMPLATE_ID=dev_template
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend